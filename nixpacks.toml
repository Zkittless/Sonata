[phases.setup]
nixPkgs = ["ffmpeg", "python311", "libsodium", "python311Packages.pynacl"]

[phases.install]
cmds = [
  "python3 -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && pip install --upgrade PyNaCl"
]

[phases.start]
cmd = ". /opt/venv/bin/activate && python3 bot.py"